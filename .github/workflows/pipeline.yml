name: Autonomous Big Data & Agentic ML Pipeline

# Defines the triggers that cause this automated workflow to run
on:
  schedule:
    # CRON expression: Runs every day exactly at midnight UTC time
    - cron: '0 0 * * *' 
  # Allows the repository owner to manually trigger the pipeline from the GitHub Actions tab
  workflow_dispatch: 

jobs:
  run-pipeline:
    # Spins up a fresh, temporary Linux server hosted by GitHub to run the code
    runs-on: ubuntu-latest
    
    # CRITICAL: Grants the robot permission to push code back to the repository. 
    # Without this, GitHub blocks the final step for security reasons.
    permissions:
      contents: write

    steps:
      # Step 1: Downloads the latest version of your repository onto the temporary server
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Installs Python and enables 'pip' caching to speed up future runs 
      # by not re-downloading heavy libraries like pandas/scikit-learn every night
      - name: 2. Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # Step 3: Reads requirements.txt and installs the necessary Python packages
      - name: 3. Install Python Libraries
        run: pip install -r requirements.txt

      # Step 4: Executes the backend pipeline script.
      # Securely injects the Gemini API key from GitHub Secrets so the script doesn't crash
      - name: 4. Run Backend Data & ML Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python pipeline.py

      # Step 5: Uses an external action to compile the mathematical PDF report
      - name: 5. Compile Automated LaTeX Report
        uses: xu-cheng/latex-action@v3
        with:
          root_file: final_report.tex

      # Step 6: The "Safe Commit" process
      - name: 6. Secure Commit & Push to GitHub
        run: |
          # Configures the robot's git profile
          git config --global user.name "Pipeline Automated Bot"
          git config --global user.email "bot@users.noreply.github.com"
          
          # Stages the freshly updated database and PDF report
          git add -f macro_data.db final_report.pdf
          
          # SAFETY CHECK: Only commits and pushes IF the database or PDF actually changed.
          # This prevents the pipeline from crashing on weekends when the stock market is closed.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated nightly data fetch, ML prediction, and PDF generation" && git push)
