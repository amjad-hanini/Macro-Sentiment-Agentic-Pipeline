name: Nightly Big Data Pipeline

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Adds a manual "Run Workflow" button for testing

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 3. Install Python Libraries
        run: pip install -r requirements.txt

      - name: 4. Run Backend Data & ML Pipeline
        run: python pipeline.py

      - name: 5. Compile Automated LaTeX Report
        uses: xu-cheng/latex-action@v3
        with:
          root_file: final_report.tex

      - name: 6. Secure Commit & Push to GitHub
        run: |
          git config --global user.name "BIA678 Automated Bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add macro_data.db final_report.pdf
          
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated nightly data fetch, ML prediction, and PDF generation"
          git push
